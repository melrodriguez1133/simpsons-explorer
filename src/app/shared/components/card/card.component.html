<ion-card class="simpsons-card">
  <ion-card-header>
    <ion-card-title>{{ title | uppercase }}</ion-card-title>
    <ion-card-subtitle>{{ subtitle }}</ion-card-subtitle>
  </ion-card-header>

  <ion-img class="simpsons-img" [src]="imageUrl"></ion-img>

  <ion-card-content>
    {{ description }}
  </ion-card-content>
</ion-card>
