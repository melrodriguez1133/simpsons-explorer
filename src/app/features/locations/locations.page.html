<app-header title="locations"></app-header>

<ion-content class="app-background" [fullscreen]="true">
  <div class="page-shell">

<ion-grid>
    <ion-row>
      <ion-col size="6" size-md="4" *ngFor="let location of Locations">
        <app-card
          class="location-card"
          [title]="location.name"
          [subtitle]="location.town"
          [imageUrl]="IMAGE_CONSTANTS.baseUrl + '/' + ImageSize.MEDIUM + location.image_path">
        </app-card>
      </ion-col>
    </ion-row>
  </ion-grid>
  </div>
</ion-content>
