<ion-split-pane contentId="main-content">

  <ion-menu
    menuId="main-menu"
    contentId="main-content"
    type="overlay"
    class="simpsons-menu">

    <ion-content class="menu-content">

      <div class="menu-shell">

        <div class="menu-brand">
          <img src="assets/images/logoS.png" alt="Springfield logo">

          <div>
            <span>Springfield</span>
            <h1>Simpsons Explorer</h1>
          </div>
        </div>

        <div class="menu-card">
          <p class="menu-label">Menú</p>
          <h2>Explora Springfield</h2>

          <ion-list lines="none">

            <ion-menu-toggle auto-hide="true" *ngFor="let p of appPages">
              <ion-item
                class="menu-item"
                [routerLink]="p.url"
                routerDirection="root"
                routerLinkActive="active-link"
                detail="false">

                <ion-icon
                  slot="start"
                  [name]="p.icon">
                </ion-icon>

                <ion-label>
                  {{ p.title }}
                </ion-label>

              </ion-item>
            </ion-menu-toggle>

          </ion-list>
        </div>

      </div>

    </ion-content>

  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-split-pane>
