<ion-split-pane contentId="main-content">

  <ion-menu
    menuId="main-menu"
    contentId="main-content"
    type="overlay">

    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Simpsons Explorer</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>

      <ion-list>

        <ion-list-header>Menú</ion-list-header>
        <ion-note>Explora el universo de Los Simpson</ion-note>

        <ion-menu-toggle auto-hide="false" *ngFor="let p of appPages">

          <ion-item
            [routerLink]="p.url"
            routerDirection="root"
            lines="none"
            detail="false">

            <ion-icon
              slot="start"
              [name]="p.icon">
            </ion-icon>

            <ion-label>
              {{ p.title }}
            </ion-label>

          </ion-item>

        </ion-menu-toggle>

      </ion-list>

    </ion-content>

  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-split-pane>
