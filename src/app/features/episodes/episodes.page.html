<app-header title="episodes"></app-header>

<ion-content class="app-background" [fullscreen]="true">
  <div class="page-shell">

  <ion-grid>
    <ion-row>
      <ion-col
        size="12"
        size-md="6"
        size-lg="4"
        *ngFor="let episode of Episodes">

        <div
          class="card-link"
          [routerLink]="['/main/episodes', episode.id]">

          <app-card
            [title]="episode.name"
            [subtitle]="'Season ' + episode.season + ' - Episode ' + episode.episode_number"
            [description]="episode.synopsis"
            [imageUrl]="IMAGE_CONSTANTS.baseUrl + '/' + ImageSize.MEDIUM + episode.image_path">
          </app-card>

        </div>

      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-infinite-scroll
  threshold="100px"
  (ionInfinite)="onIonInfinite($event)">
    <ion-infinite-scroll-content
    loadingSpinner="bubbles"
        loadingText="Cargando más episodios...">>
      
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
  </div>
</ion-content>
