<app-header title="Home"></app-header>

<ion-content class="ion-padding">
   <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let character of Characters"> 
        <app-card 
          [title]="character.name" 
          [subtitle]="character.occupation" 
          [description]="character.gender"
          [imageUrl]=" IMAGE_CONSTANTS.baseUrl + '/' + ImageSize.MEDIUM + character.portrait_path">
        </app-card>     
    </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="4" size-md="2" *ngFor="let location of Locations"> 
        <app-card 
          [title]="location.name" 
          [subtitle]="location.town " 
          [imageUrl]=" IMAGE_CONSTANTS.baseUrl + '/' + ImageSize.MEDIUM + location.image_path">
        </app-card>
      </ion-col>    
    </ion-row>
    <ion-row>

      <ion-col size="12" size-md="6" *ngFor="let episode of Episodes"> 
        <app-card 
          [title]="episode.name" 
          [subtitle]="episode.season + ' - ' + episode.episode_number" 
          [description]="episode.synopsis"
          [imageUrl]=" IMAGE_CONSTANTS.baseUrl + '/' + ImageSize.MEDIUM + episode.image_path">
        </app-card>
      </ion-col>
    </ion-row>
  </ion-grid>
    </ion-content>
